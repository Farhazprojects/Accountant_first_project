services:
  # 1. New Local Database Container
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=accountant_first_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_postgres_password_here
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Your Backend API Engine
  api:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app           # <--- Syncs your live local files to the container
      - /app/node_modules        # <--- Protects the container's isolated dependencies
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db  # Points directly to the database service container
      - DB_PORT=5432
      - DB_NAME=accountant_first_dev
      - DB_USER=postgres
      - DB_PASS=your_postgres_password_here
      - JWT_SECRET=a_long_random_secret_key_for_testing_123!
    depends_on:
      - db

  # 3. Your Frontend React Dashboard
  web:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: