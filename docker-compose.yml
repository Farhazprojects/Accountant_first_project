services:
  # 1. New Local Database Container
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=accountant_first_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accountant_first_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Your Backend API Engine
  api:
    build: 
      context: ./backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db  # Points directly to the database service container
      - DB_PORT=5432
      - DB_NAME=accountant_first_dev
      - DB_USER=postgres
      - DB_PASS=${DB_PASSWORD:-password}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  # 3. Your Frontend React Dashboard
  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api   # Browser calls same origin; nginx proxies to api service
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
